name: Deploy OfferMatch Landing

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nextjs-landing/package-lock.json

      - name: Install dependencies
        working-directory: nextjs-landing
        run: npm ci

      - name: Build static export
        working-directory: nextjs-landing
        run: |
          npm run build
          # Copy .html files into folders as index.html for nginx compatibility
          for f in out/*.html; do
            name=$(basename "$f" .html)
            if [ "$name" != "index" ] && [ "$name" != "404" ]; then
              mkdir -p "out/$name"
              cp "$f" "out/$name/index.html"
            fi
          done

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare server directory
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            mkdir -p ~/offermatch
          "

      - name: Deploy static files to server
        run: |
          rsync -avz --delete \
            nextjs-landing/out/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/offermatch/

      - name: Verify deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            ls -la ~/offermatch/ &&
            echo 'Deployment successful!'
          "
